# compose.yaml — single-station broadcast stack.
# One deployment == one radio station. Run a second station by deploying this stack again
# elsewhere with its own .env (MEDIA_DIR, STATION_NAME, ports). No proxy, no tenancy.
#
# Networks:
#   core  : api <-> engine <-> icecast <-> kokoro, and admin_ui -> api (app traffic)
#   data  : api <-> db only (Postgres is invisible to engine/icecast/kokoro)
#
# Security-critical rule: the engine's Liquidsoap control port (1234) is UNAUTHENTICATED.
# It is reachable inside the container network but is NEVER given a `ports:` mapping — Docker's
# network isolation is the firewall. To debug it, `docker compose exec engine bash` and talk to
# localhost:1234 from inside.
#
# Secrets come from a .env file (see .env.example). `${VAR:?}` fails the run loudly if unset.

name: genwave

networks:
  core: {}
  data: {}

volumes:
  pgdata: {}
  tts: {}
  # ASP.NET Core Data Protection keys — persisted so the auth cookie survives api restarts
  dp_keys: {}
  # Authored safe-loop segments (F27) — api renders + writes, engine only ever plays (F11.12).
  # Kept separate from /media (F11.4): generated artifacts never enter the read-only library mount.
  authored: {}
  # Downloaded Piper voice model (SPEC F70.1, STORY-190) — persisted so a container restart
  # doesn't re-fetch it from huggingface.
  piper_models: {}

services:
  db:
    image: postgres:16.4
    networks: [data]                          # NOT on core; no published ports
    environment:
      POSTGRES_DB: genwave
      POSTGRES_USER: genwave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      LIBRARY_DB_PASSWORD: ${LIBRARY_DB_PASSWORD:?}    # the dedicated library_svc role (db/01-library.sh)
      STATION_DB_PASSWORD: ${STATION_DB_PASSWORD:?}   # the dedicated station_svc role (db/06-station-settings-migration.sh)
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/01-library.sh:/docker-entrypoint-initdb.d/01-library.sh:ro   # library schema + role on first boot
      - ./db/06-station-settings-migration.sh:/docker-entrypoint-initdb.d/06-station-settings-migration.sh:ro  # station schema + role on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genwave -d genwave"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  icecast:
    build:
      context: ./icecast
    networks: [core]
    ports:
      - "8000:8000"                            # listener stream + Icecast status, direct on localhost
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:?}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:?}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8000'"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  engine:
    build:
      context: ./engine                        # engine/Dockerfile extends savonet/liquidsoap:v2.4.4 with curl + entrypoint.sh
    networks: [core]                            # control port 1234 deliberately NOT published
    # No hard depends_on: api here — the entrypoint.sh fetches config with retries and falls back
    # to the GW_XFADE_* env vars below if the api is slow/down on a cold start. A strict
    # depends_on: api: service_healthy here would create a potential deadlock (api already depends
    # on icecast+engine being healthy for its own healthcheck path). Startup is tolerant by design.
    depends_on:
      icecast:
        condition: service_healthy              # connect the source to a live Icecast
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:?}
      STATION_NAME: ${STATION_NAME:-GWAV 108.8}   # same source as api's Station__Name — feeds icy-name + StreamTitle prefix
      # Fallback crossfade defaults: the entrypoint.sh fetches the effective values from the api
      # at boot (honouring any station.settings overlay). If the api is unreachable these env vars
      # are used as-is. applyMode=engine-restart: restart the engine container to apply an edit.
      GW_XFADE_MIN: "${GW_XFADE_MIN:-2}"
      GW_XFADE_MAX: "${GW_XFADE_MAX:-8}"
      # Inter-safe-track gap (F29.6/STORY-099/R4, gitea-#182). Read directly by genwave.liq via
      # environment.get — the entrypoint.sh fetch + station.settings overlay wiring is R5
      # (F19 allowlist); until then this compose default is the only source.
      # applyMode=engine-restart. 0 disables the gap.
      GW_SAFE_GAP_SECONDS: "${GW_SAFE_GAP_SECONDS:-7.0}"
    volumes:
      - ./engine/genwave.liq:/genwave.liq:ro
      - ${MEDIA_DIR:?}:/media:ro                # READ-ONLY: the engine plays, never writes
      - tts:/tts:ro                             # READ-ONLY: TTS audio clips generated by api/kokoro
      - authored:/authored:ro                   # READ-ONLY: authored safe-loop segments (F27, F11.12)
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/1234'"]  # control socket accepting?
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/GenWave.Host/Dockerfile
    networks: [core, data]                      # core -> engine, data -> db
    ports:
      - "8080:8080"                             # control-plane API, direct on localhost
      - "8081:8081"                             # public spectator listener (SPEC F64.1/F64.2, STORY-172) —
                                                 # Standard mode wants LAN reachability, same as 8080; the
                                                 # demo/appliance topology (PLAN T19) instead reaches it only
                                                 # via Caddy on the core network.
    depends_on:
      db:
        condition: service_healthy              # schema must exist before first query
      engine:
        condition: service_healthy              # convenience; the feeder retries regardless
      kokoro:
        condition: service_healthy              # TTS service must be ready before api starts
    environment:
      # The library service owns the only DB access; it connects as the dedicated library_svc role
      # with its search_path pinned to the `library` schema.
      ConnectionStrings__Library: "Host=db;Database=genwave;Username=library_svc;Password=${LIBRARY_DB_PASSWORD:?};Search Path=library"
      ConnectionStrings__Station: "Host=db;Database=genwave;Username=station_svc;Password=${STATION_DB_PASSWORD:?};Search Path=station"
      # Single admin password for the Admin UI login. Empty = open API (local-dev convenience).
      Admin__Password: "${ADMIN_PASSWORD:-}"
      # Public listener (SPEC F64.1/F64.2, STORY-172): the app never force-binds a port — Kestrel
      # binds whatever ASPNETCORE_URLS lists, so :8081 is added alongside the existing :8080.
      # Spectator__PublicPort tells SurfaceGateMiddleware which local port is public-only: on it,
      # only the spectator surface + /health respond — admin, /media/*, /internal/* 404 regardless
      # of any other flag. Env/compose-only, deliberately not in the settings allowlist.
      ASPNETCORE_URLS: "http://+:8080;http://+:8081"
      Spectator__PublicPort: "8081"
      Liquidsoap__Host: engine
      Liquidsoap__Port: "1234"
      Liquidsoap__QueueId: "q"
      Loudness__TargetLufs: "-16"
      Loudness__CeilingDbtp: "-1"
      Library__MediaRoot: "/media"
      Library__ScanIntervalSeconds: "60"
      Library__EnrichmentConcurrency: "4"
      # Station identity (StationOptions — validated at startup)
      Station__Id: "genwave-1"
      Station__Name: ${STATION_NAME:-GWAV 108.8}  # shared with engine's STATION_NAME
      Station__Voice: "af_heart"
      Station__Scope__LibraryIds__0: "1"
      # TTS substrate (TtsOptions)
      Tts__Endpoint: "http://kokoro:8880"
      Tts__Format: "wav"
      Tts__RenderBudgetSeconds: "30"
      Tts__CacheRoot: "/tts"
      # Piper local fallback (SPEC F70.1, STORY-190): FallbackTtsSynthesizer routes here when
      # Kokoro is unhealthy or a render throws. Matches the `piper` service's own MODEL_DOWNLOAD_LINK
      # voice below — Tts__Fallback__Voice is documentation only (never sent on the wire).
      Tts__Fallback__Endpoint: "http://piper:5000"
      Tts__Fallback__Voice: "en_US-lessac-medium"
      # Icecast admin-stats listener count (SPEC F62.12 addendum, STORY-179, gitea-#10). Env/compose-
      # only, deliberately absent from StationSettingsAllowlist — Icecast__AdminPassword is a secret
      # (F19.3), never readable or writable through the settings API.
      Icecast__StatsUrl: http://icecast:8000
      Icecast__AdminPassword: ${ICECAST_ADMIN_PASSWORD:?}
    volumes:
      - ${MEDIA_DIR:?}:/media:ro                # READ-ONLY: the library scans + analyses, never writes
      - tts:/tts                                # READ-WRITE: api writes TTS clips here for engine to play
      - dp_keys:/var/lib/genwave/dp-keys        # READ-WRITE: ASP.NET Core Data Protection key ring
      - authored:/authored                      # READ-WRITE: api renders authored safe-loop segments (F27, F11.12)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.6.0   # PIN — do not use latest
    networks: [core]                                    # internal only; control port 8880 NEVER published
    # kokoro-fastapi leaks RSS under load (upstream #453 — root cause fixed after v0.2.x; #262
    # still open). Fresh baseline is ~1.2GiB; this cap is the fail-closed backstop: leak past it
    # and the kernel OOM-kills the container, `restart: unless-stopped` brings it back clean in
    # seconds. Blast radius is one failed TTS render — the broadcast keeps playing music.
    mem_limit: 3g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8880'"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  piper:
    # PIN — artibex/piper-http publishes exactly one tag (`latest`); no versioned tag exists to
    # pin against instead (checked via `docker manifest inspect`/Docker Hub's tags API at wiring
    # time). Pinned by the DIGEST that tag resolved to, so this is immutable regardless of what
    # `latest` becomes upstream — re-verify (`docker manifest inspect artibex/piper-http:latest`)
    # and bump the digest at each deliberate upgrade.
    image: artibex/piper-http@sha256:87cc63665fda1a6dfecb139408552b1d2d8a440ed3f6ef3cdabe10661c184a28
    networks: [core]                                    # internal only; no host ports
    environment:
      # Wraps upstream `piper.http_server`: downloads this ONNX voice model to MODEL_TARGET_FOLDER
      # on first boot (persisted in the piper_models volume below) and serves it for the container's
      # lifetime — matches the api's Tts__Fallback__Voice above (en_US-lessac-medium).
      MODEL_DOWNLOAD_LINK: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx?download=true"
      SPEAKER: "0"
    volumes:
      - piper_models:/app/models
    # CPU-only min-spec: the onnx runtime + a "medium" quality voice model comfortably fits well
    # under 1GiB; a hard cap here is the same fail-closed backstop as kokoro's above, just sized
    # to Piper's much smaller footprint.
    mem_limit: 768m
    healthcheck:
      # Plain TCP-connect check, same idiom as kokoro/icecast/engine above — piper.http_server's
      # one route (`/`) 500s on every request without a `?text=` query, even when perfectly
      # healthy, so an HTTP-level healthcheck would misreport a healthy server as down.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/5000'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s   # first boot downloads the voice model from huggingface
    restart: unless-stopped

  admin_ui:
    build:
      context: ./admin-ui
    profiles: ["admin"]                           # F61.4/STORY-166: Appliance/Headless boxes clear
                                                   # COMPOSE_PROFILES in .env so no Node runtime runs;
                                                   # Operator/Standard's default .env keeps it enabled.
    networks: [core]                             # reaches the api over the core network
    ports:
      - "3000:3000"                              # Admin UI, direct on localhost
    environment:
      # The Next.js rewrite proxies /api/* to the C# backend (same-origin in the browser → no CORS).
      BACKEND_URL: "http://api:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: Next.js standalone binds IPv4-only, but busybox wget resolves
      # `localhost` to ::1 (IPv6) first → connection refused. Hit the address it actually listens on.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
