<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GenWave — Spectator</title>
  <!-- Absolute paths, not relative: the page is served at /spectator (no trailing slash), so a
       relative "styles.css"/"app.js" would resolve against the URL's parent (RFC 3986 — the last
       path segment is replaced, not treated as a directory) and 404. -->
  <link rel="icon" href="/spectator/favicon.ico" />
  <link rel="stylesheet" href="/spectator/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <p class="eyebrow">GenWave</p>
      <h1 class="wordmark" id="station-name">GenWave</h1>
    </header>

    <section class="card now-playing" id="now-playing" aria-live="polite">
      <span class="now-playing__dot" id="now-playing-dot" aria-hidden="true"></span>
      <div class="now-playing__body">
        <p class="now-playing__kicker" id="now-playing-kicker">Loading…</p>
        <h2 class="now-playing__title" id="now-playing-title"></h2>
        <p class="now-playing__artist" id="now-playing-artist"></p>
        <div class="now-playing__meta" id="now-playing-meta" hidden>
          <div class="progress" id="progress" hidden>
            <div class="progress__fill" id="progress-fill"></div>
          </div>
          <p class="now-playing__clock" id="now-playing-clock"></p>
        </div>
      </div>
    </section>

    <section class="card" aria-labelledby="listen-heading">
      <h2 class="section-title" id="listen-heading">Listen live</h2>
      <audio id="player" class="player" controls preload="none" aria-label="GenWave live stream" hidden></audio>
      <p class="hint" id="player-hint" hidden>Stream not configured.</p>
    </section>

    <section class="card" aria-labelledby="history-heading">
      <h2 class="section-title" id="history-heading">Recently played</h2>
      <ul class="history" id="history-list"></ul>
    </section>

    <section class="card" aria-labelledby="stats-heading">
      <h2 class="section-title" id="stats-heading">Catalog</h2>
      <dl class="stats" id="stats-grid"></dl>
    </section>

    <section class="card" aria-labelledby="about-heading">
      <h2 class="section-title" id="about-heading">About</h2>
      <dl class="about" id="about-grid"></dl>
    </section>

    <footer class="footer">
      <p>GenWave — self-hosted internet radio.</p>
    </footer>
  </div>
  <script src="/spectator/app.js" defer></script>
</body>
</html>
