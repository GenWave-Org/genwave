name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore GenWave.sln
      - name: Build (warnings are errors)
        run: dotnet build GenWave.sln --no-restore --configuration Release
      # Integration tests need fixture-managed side containers (Postgres, Kokoro) — they run
      # on-demand on a dev box, not in CI (same policy as the pre-migration pipeline).
      - name: Test
        run: dotnet test GenWave.sln --no-build --configuration Release --filter "Category!=Integration"

  admin-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest
      - run: npm run build

  # Images publish only from main pushes; PRs prove they still build via the jobs above plus
  # the docker build here being cheap to re-verify locally. Tagged `home-*` per the runbook —
  # the Business edition's images will carry their own prefix elsewhere.
  images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test, admin-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        run: |
          docker build -f src/GenWave.Host/Dockerfile \
            --label org.opencontainers.image.source=https://github.com/GenWave-Org/genwave \
            --label org.opencontainers.image.description="GenWave Home control-plane API" \
            --label org.opencontainers.image.licenses=AGPL-3.0-only \
            -t ghcr.io/genwave-org/genwave:home-${{ github.sha }} \
            -t ghcr.io/genwave-org/genwave:home-latest \
            .
          docker push ghcr.io/genwave-org/genwave:home-${{ github.sha }}
          docker push ghcr.io/genwave-org/genwave:home-latest
      - name: Build + push Icecast image
        run: |
          docker build \
            --label org.opencontainers.image.source=https://github.com/GenWave-Org/genwave \
            --label org.opencontainers.image.description="GenWave Home Icecast fan-out" \
            --label org.opencontainers.image.licenses=AGPL-3.0-only \
            -t ghcr.io/genwave-org/genwave-icecast:home-${{ github.sha }} \
            -t ghcr.io/genwave-org/genwave-icecast:home-latest \
            ./icecast
          docker push ghcr.io/genwave-org/genwave-icecast:home-${{ github.sha }}
          docker push ghcr.io/genwave-org/genwave-icecast:home-latest
