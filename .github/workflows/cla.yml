name: CLA

# contributor-assistant: holds a status check red on every PR until the author has signed the
# CLA (CLA.md at the repo root). Signatures are recorded as JSON on the `cla-signatures` branch.
# The author signs by replying to the bot's PR comment with the sentence below — one time, ever.
#
# ⚠ The `cla-signatures` branch MUST already exist and stay unprotected — the action does NOT
# create it ("Branch cla-signatures not found", learned 2026-07-17). It exists as an orphan ref;
# if the repo is ever recreated: git init an orphan branch with one empty commit and push it.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/GenWave-Org/genwave/blob/main/CLA.md'
          branch: 'cla-signatures'
          # Accounts exempt from signing: the maintainer + bots.
          allowlist: 'genwave-radio,dependabot[bot]'
          custom-notsigned-prcomment: >
            Thank you for your contribution to GenWave! Before we can merge, we need you to sign
            our [Contributor License Agreement](https://github.com/GenWave-Org/genwave/blob/main/CLA.md)
            — it keeps the Home (AGPL) / Business dual-license model viable (see CONTRIBUTING.md
            for the why). Signing is one comment, one time, ever:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
