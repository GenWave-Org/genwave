name: Release

# Tag-triggered release (SPEC F65.2, STORY-176): push a `v*` tag -> build+test, publish images
# stamped with the tag as GW_VERSION, then create the GitHub Release. Mirrors ci.yml's `images`
# job (same registry, same `home-*` tag prefix -- the Business edition gets its own prefix
# elsewhere) but stamps the pushed tag instead of the commit sha. Publishes api + icecast +
# every image compose can run pinned: api, icecast, admin_ui, and engine (gh-#93: a --pinned
# demo box ran a stale locally-built admin_ui for two releases because it was never published;
# engine had the same exposure). Note genwave.liq is a bind mount, not baked into the engine
# image -- the image carries only the Liquidsoap version pin + entrypoint.sh.
#
# Pushing the tag is the ONLY manual act: this workflow never commits or pushes back to the repo.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore GenWave.sln
      - name: Build (warnings are errors)
        run: dotnet build GenWave.sln --no-restore --configuration Release
      # Same policy as ci.yml: integration tests need fixture-managed side containers and run
      # on a dev box, not here.
      # ffmpeg: the F88 artwork specs (Story222) drive the REAL binary (gh-#105) — same step
      # as ci.yml's build-test; this gate runs its own test pass and needs it too.
      - name: Install ffmpeg (artwork specs drive the real binary)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ffmpeg
      - name: Test
        run: dotnet test GenWave.sln --no-build --configuration Release --filter "Category!=Integration"

  release:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create
      packages: write   # ghcr.io push
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GW_TAG is bound once via env and referenced as "$GW_TAG" (quoted) below -- never expanded
      # directly into script text -- so a malicious tag (e.g. `v1;curl...|sh`) can't inject
      # commands into this packages:write runner. See GitHub's script-injection mitigation.
      - name: Build + push API image (GW_VERSION=${{ github.ref_name }})
        env:
          GW_TAG: ${{ github.ref_name }}
        run: |
          docker build -f src/GenWave.Host/Dockerfile \
            --build-arg "GW_VERSION=$GW_TAG" \
            --label org.opencontainers.image.source=https://github.com/GenWave-Org/genwave \
            --label org.opencontainers.image.description="GenWave Home control-plane API" \
            --label org.opencontainers.image.licenses=AGPL-3.0-only \
            --label "org.opencontainers.image.version=$GW_TAG" \
            -t "ghcr.io/genwave-org/genwave:home-$GW_TAG" \
            -t ghcr.io/genwave-org/genwave:home-latest \
            .
          docker push "ghcr.io/genwave-org/genwave:home-$GW_TAG"
          docker push ghcr.io/genwave-org/genwave:home-latest

      - name: Build + push Icecast image
        env:
          GW_TAG: ${{ github.ref_name }}
        run: |
          docker build \
            --label org.opencontainers.image.source=https://github.com/GenWave-Org/genwave \
            --label org.opencontainers.image.description="GenWave Home Icecast fan-out" \
            --label org.opencontainers.image.licenses=AGPL-3.0-only \
            --label "org.opencontainers.image.version=$GW_TAG" \
            -t "ghcr.io/genwave-org/genwave-icecast:home-$GW_TAG" \
            -t ghcr.io/genwave-org/genwave-icecast:home-latest \
            ./icecast
          docker push "ghcr.io/genwave-org/genwave-icecast:home-$GW_TAG"
          docker push ghcr.io/genwave-org/genwave-icecast:home-latest

      # BACKEND_URL is baked at build time (next.config.ts rewrites) and defaults to
      # http://api:8080 in admin-ui/Dockerfile -- correct for every compose topology, so that
      # one needs no build-arg here. GW_VERSION feeds the footer's version stamp (gh-#7), the
      # same tag value the API image bakes into InformationalVersion.
      - name: Build + push Admin UI image (GW_VERSION=${{ github.ref_name }})
        env:
          GW_TAG: ${{ github.ref_name }}
        run: |
          docker build \
            --build-arg "GW_VERSION=$GW_TAG" \
            --label org.opencontainers.image.source=https://github.com/GenWave-Org/genwave \
            --label org.opencontainers.image.description="GenWave Home admin UI" \
            --label org.opencontainers.image.licenses=AGPL-3.0-only \
            --label "org.opencontainers.image.version=$GW_TAG" \
            -t "ghcr.io/genwave-org/genwave-admin-ui:home-$GW_TAG" \
            -t ghcr.io/genwave-org/genwave-admin-ui:home-latest \
            ./admin-ui
          docker push "ghcr.io/genwave-org/genwave-admin-ui:home-$GW_TAG"
          docker push ghcr.io/genwave-org/genwave-admin-ui:home-latest

      # genwave.liq is NOT in this image (bind-mounted from the checkout at run time) -- this
      # publishes the Liquidsoap version pin + entrypoint.sh, the two parts a --pinned box
      # could otherwise never receive after first deploy.
      - name: Build + push Engine image
        env:
          GW_TAG: ${{ github.ref_name }}
        run: |
          docker build \
            --label org.opencontainers.image.source=https://github.com/GenWave-Org/genwave \
            --label org.opencontainers.image.description="GenWave Home Liquidsoap engine" \
            --label org.opencontainers.image.licenses=AGPL-3.0-only \
            --label "org.opencontainers.image.version=$GW_TAG" \
            -t "ghcr.io/genwave-org/genwave-engine:home-$GW_TAG" \
            -t ghcr.io/genwave-org/genwave-engine:home-latest \
            ./engine
          docker push "ghcr.io/genwave-org/genwave-engine:home-$GW_TAG"
          docker push ghcr.io/genwave-org/genwave-engine:home-latest

      # gh CLI over a third-party action -- it's preinstalled on the runner and needs only the
      # default token. No repo write beyond the Release object itself (not a commit, not a push).
      # Idempotent: a release created through the GitHub UI ("Draft a new release") creates the
      # tag AND the Release together, so this workflow still fires on the tag push and must not
      # 422 on the already-existing Release (observed on v2.0.0). Bare-tag pushes still get their
      # Release created here.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GW_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$GW_TAG" --json name >/dev/null 2>&1; then
            echo "Release $GW_TAG already exists (UI-created) -- skipping creation."
          else
            gh release create "$GW_TAG" --generate-notes --title "$GW_TAG"
          fi
